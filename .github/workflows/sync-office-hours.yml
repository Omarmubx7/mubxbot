name: Sync Office Hours

on:
  # Run automatically every Sunday at 3 AM Amman time (12 AM UTC)
  schedule:
    - cron: '0 0 * * 0'
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymupdf

      - name: Run parser and generate doctors JSON
        run: |
          python scripts/parse_office_hours.py
          python scripts/generate_doctors_json.py

      - name: Commit updated JSON if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/office_hours.json public/office_hours.json public/doctors.json
          git diff --cached --quiet || git commit -m "chore: auto-update office hours data"
          git push
