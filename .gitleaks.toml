title = "mubxbot-gitleaks-config"

[allowlist]
description = "Allow safe placeholder examples"
paths = [
  '''\.env\.example$''',
  '''^node_modules/''',
  '''^\.next/''',
  '''^logs/''',
  '''^dist/''',
  '''^build/'''
]

[[rules]]
id = "env-sensitive-assignment"
description = "Potential sensitive environment assignment"
regex = '''(?im)^(?:[A-Z][A-Z0-9_]*(?:PASSWORD|PASSWD|SECRET|TOKEN|API_KEY|APP_PASSWORD|CLIENT_SECRET|SESSION_SECRET)[A-Z0-9_]*)\s*=\s*[^\s#]+'''
path = '''(^|/)\.env(\..+)?$'''
tags = ["credentials", "secrets", "env"]

[[rules]]
id = "azure-client-secret"
description = "Potential Azure client secret assignment"
regex = '''(?i)AZURE_CLIENT_SECRET\s*=\s*[^\s#]+'''
path = '''(^|/)\.env(\..+)?$'''
tags = ["azure", "secret"]

[[rules]]
id = "bearer-token-like"
description = "Potential bearer/JWT token"
regex = '''(?i)(graph_token|sharepoint_fedauth|sharepoint_rtfa)\s*=\s*[A-Za-z0-9_\-\.\+/=]{20,}'''
path = '''(^|/)\.env(\..+)?$'''
tags = ["token", "jwt"]
